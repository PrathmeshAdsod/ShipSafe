version: "v1"
environment: ambient
components:
  - name: announce_issue
    type: DeterministicStepComponent
    tool_name: create_issue_note
    inputs:
      - from: "context:project_id"
        as: "project_id"
      - from: "context:issue_id"
        as: "issue_iid"
      - from: "ShipSafe is challenging this issue now.\n\nThe goal is to decide whether the work is ready for development or needs clarification."
        as: "body"
        literal: true
  - name: readiness_agent
    type: AgentComponent
    prompt_id: shipsafe_issue_readiness
    inputs:
      - from: "context:goal"
        as: "goal"
    ui_log_events:
      - "on_agent_final_answer"
  - name: clarifier_agent
    type: AgentComponent
    prompt_id: shipsafe_issue_clarifier
    inputs:
      - from: "context:goal"
        as: "goal"
    ui_log_events:
      - "on_agent_final_answer"
  - name: pragmatist
    type: AgentComponent
    prompt_id: shipsafe_issue_pragmatist
    inputs:
      - from: "context:goal"
        as: "goal"
      - from: "context:readiness_agent.final_answer"
        as: "readiness_output"
      - from: "context:clarifier_agent.final_answer"
        as: "clarifier_output"
    ui_log_events:
      - "on_agent_final_answer"
  - name: note_builder
    type: AgentComponent
    prompt_id: shipsafe_issue_note_builder
    inputs:
      - from: "context:pragmatist.final_answer"
        as: "verdict_json"
      - from: "context:project_id"
        as: "project_id"
      - from: "context:issue_id"
        as: "issue_iid"
    ui_log_events:
      - "on_agent_final_answer"
  - name: post_issue_note
    type: DeterministicStepComponent
    tool_name: create_issue_note
    inputs:
      - from: "context:project_id"
        as: "project_id"
      - from: "context:issue_id"
        as: "issue_iid"
      - from: "context:note_builder.final_answer"
        as: "body"
prompts:
  - prompt_id: shipsafe_issue_readiness
    name: ShipSafe Issue Readiness
    unit_primitives: []
    prompt_template:
      system: |
        Identify the strongest case that this issue is ready for development.
        Respond with valid JSON only. No markdown fences. No prose before or after.
        {
          "position": "READY",
          "confidence": 0,
          "reasons": [],
          "complexity": "LOW|MEDIUM|HIGH"
        }
      user: "{{goal}}"
  - prompt_id: shipsafe_issue_clarifier
    name: ShipSafe Issue Clarifier
    unit_primitives: []
    prompt_template:
      system: |
        Find missing acceptance criteria, ambiguity, and likely duplicate concerns in this issue.
        Respond with valid JSON only. No markdown fences. No prose before or after.
        {
          "position": "NEEDS_CLARIFICATION",
          "confidence": 0,
          "gaps": [],
          "duplicate_candidates": []
        }
      user: "{{goal}}"
  - prompt_id: shipsafe_issue_pragmatist
    name: ShipSafe Issue Pragmatist
    unit_primitives: []
    prompt_template:
      system: |
        Evaluate both issue analyses and decide whether the issue is ready for development.
        Respond with valid JSON only. No markdown fences. No prose before or after.
        {
          "outcome": "READY_FOR_DEVELOPMENT|NEEDS_CLARIFICATION",
          "confidence": 0,
          "summary": "2-3 sentences",
          "complexity": "LOW|MEDIUM|HIGH",
          "gaps": [],
          "duplicate_candidates": []
        }
      user: |
        Issue context:
        {{goal}}

        Ready output:
        {{readiness_output}}

        Clarification output:
        {{clarifier_output}}
  - prompt_id: shipsafe_issue_note_builder
    name: ShipSafe Issue Note Builder
    unit_primitives: []
    prompt_template:
      system: |
        Convert the verdict JSON into a short markdown note for an issue.
        Keep the note concise and outcome-focused so maintainers can see whether the work is ready or blocked by missing clarity.
        Do not use markdown fences. Do not add prose before or after the final note.
        End the note with exactly one hidden HTML comment:
        <!-- shipsafe-verdict:v1:{...json...} -->
        Inside that hidden comment, embed this exact raw JSON envelope:
        {
          "kind": "issue",
          "event": {
            "project_id": <project_id>,
            "issue_iid": <issue_iid>
          },
          "verdict": <the parsed verdict_json object exactly as provided>
        }
        Preserve every verdict_json key, string, boolean, array, and nested object exactly.
        Return only the final markdown note.
      user: |
        project_id: {{project_id}}
        issue_iid: {{issue_iid}}

        verdict_json:
        {{verdict_json}}
routers:
  - from: "announce_issue"
    to: "readiness_agent"
  - from: "readiness_agent"
    to: "clarifier_agent"
  - from: "clarifier_agent"
    to: "pragmatist"
  - from: "pragmatist"
    to: "note_builder"
  - from: "note_builder"
    to: "post_issue_note"
  - from: "post_issue_note"
    to: "end"
flow:
  entry_point: "announce_issue"
